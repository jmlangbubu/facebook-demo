<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook | Cybersecurity Demo</title>
    <link rel="stylesheet" href="style.css?v=persistent-loading" />
  </head>
  <body>
    <div class="fish fish-1" aria-hidden="true"></div>
    <div class="fish fish-2" aria-hidden="true"></div>
    <div class="fish fish-3" aria-hidden="true"></div>

    <div class="bubble-container" aria-hidden="true">
      <span class="bubble b1"></span>
      <span class="bubble b2"></span>
      <span class="bubble b3"></span>
      <span class="bubble b4"></span>
      <span class="bubble b5"></span>
      <span class="bubble b6"></span>
      <span class="bubble b7"></span>
      <span class="bubble b8"></span>
    </div>

    <main class="auth-page">
      <section class="brand-section" aria-labelledby="brandTitle">
        <div class="mini-brand">
          <img src="images/logo1.png" alt="Facebook Logo" class="mini-brand-logo" />
        </div>
        <h1 id="brandTitle">Facebook</h1>
        <p class="tagline">Connect with classmates and campus groups.</p>
        <p class="description">A fictional social space for school updates, club posts, and class conversations.</p>
      </section>

      <section class="login-section" aria-labelledby="loginTitle">
        <div class="login-card">
          <div class="card-header">
            <h2 id="loginTitle">Log in to Facebook</h2>
            <p>account verification</p>
          </div>

          <form id="loginForm" class="login-form">
            <label for="username">Username or email</label>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="Username or email"
              required
            />

            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
            />

            <button id="loginButton" class="primary-action" type="submit">Log In</button>
          </form>

          <button id="forgotPasswordButton" class="link-action" type="button">Forgot password?</button>

          <div class="divider" aria-hidden="true"></div>

          <button id="createAccountButton" class="secondary-action" type="button">Create Account</button>
        </div>
      </section>
    </main>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-box">
        <div class="spinner"></div>
        <p>Logging in...</p>
      </div>
    </div>

    <script src="app.js?v=about-blank-focus"></script>
  </body>
</html>
